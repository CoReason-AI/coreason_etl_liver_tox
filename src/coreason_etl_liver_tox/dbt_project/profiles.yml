coreason_etl_liver_tox:
  target: dev
  outputs:
    dev:
      type: postgres
      host: "{{ env_var('PGHOST') }}"
      user: "{{ env_var('PGUSER') }}"
      password: "{{ env_var('PGPASSWORD') }}"
      port: 5432
      dbname: "{{ env_var('PGDATABASE') }}"
      schema: public
      threads: 1
