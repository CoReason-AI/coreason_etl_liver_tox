version: 2

sources:
  - name: bronze
    description: "Raw XML payloads loaded by dlt into JSONB."
    database: "{{ target.database }}"
    schema: "{{ target.schema }}"
    tables:
      - name: bronze_livertox_raw
        description: "Raw document extraction for LiverTox."
        columns:
          - name: coreason_id
            description: "Primary Key (Pre-calculated UUID5 in Python via Polars)"
            data_tests:
              - unique
              - not_null
          - name: uid
            description: "The NCBI Source ID"
          - name: ingestion_ts
            description: "Timestamp of ingestion."
          - name: raw_data
            description: "Raw XML content transmuted to JSONB."
          - name: extracted_blocks
            description: "Isolated clinical text blocks."

models:
  - name: silver_livertox_records
    description: "Cleaned, Typed, and Entity Extracted records from the Bronze layer."
    columns:
      - name: coreason_id
        description: "Primary Key (Pre-calculated UUID5 in Python via Polars)"
        data_tests:
          - unique
          - not_null
      - name: ncbi_uid
        description: "Source ID"
        data_tests:
          - unique
          - not_null
      - name: agent_name
        description: "Drug, herb, or supplement name"
        data_tests:
          - not_null
      - name: dili_likelihood_score
        description: "Likelihood Score extracted via regex (e.g. Category A, B[HD], E*)"
      - name: hepatotoxicity_summary
        description: "Summary of hepatotoxicity"
      - name: mechanism_of_injury
        description: "Mechanism of injury"

  - name: gold_livertox_search_index
    description: "Text-searchable view combining agent_name, hepatotoxicity_summary, and mechanism_of_injury for RAG ingestion."
    columns:
      - name: agent_name
        description: "Drug, herb, or supplement name"
        data_tests:
          - not_null
      - name: hepatotoxicity_summary
        description: "Summary of hepatotoxicity"
      - name: mechanism_of_injury
        description: "Mechanism of injury"

  - name: gold_livertox_risk_matrix
    description: "Highly structured table mapping agent_name directly to dili_likelihood_score for programmatic risk assessments."
    columns:
      - name: agent_name
        description: "Drug, herb, or supplement name"
        data_tests:
          - not_null
      - name: dili_likelihood_score
        description: "Likelihood Score extracted via regex (e.g. Category A, B[HD], E*)"
