
name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@ff7abcd0c3c05ccf6adc123a8cd1fd4fb30fb493
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: '3.14'
      - name: Install dependencies
        run: uv sync --all-extras --dev
        shell: bash
      - name: Run pre-commit
        run: uv run pre-commit run --all-files
        shell: bash

  test-ubuntu:
    needs: [lint-and-audit]
    if: always() && needs.lint-and-audit.result == 'success'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.14"]
    steps:
      - uses: actions/checkout@ff7abcd0c3c05ccf6adc123a8cd1fd4fb30fb493
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: ${{ matrix.python-version }}

      - name: Set PYTHON_GIL for Free-Threading
        if: matrix.python-version == '3.14t'
        run: echo "PYTHON_GIL=0" >> $GITHUB_ENV
        shell: bash

      - name: Install dependencies
        run: uv sync --all-extras --dev
        shell: bash

      - name: Run tests
        run: uv run pytest --cov=src --cov-report=xml
        shell: bash

      - name: Build docs
        run: uv run zensical build
        shell: bash

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: true
          verbose: true

  test-extended:
    needs: [lint-and-audit]
    if: always() && needs.lint-and-audit.result == 'success'
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-latest]
        python-version: ["3.14"]
    steps:
      - uses: actions/checkout@ff7abcd0c3c05ccf6adc123a8cd1fd4fb30fb493
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: ${{ matrix.python-version }}

      - name: Set PYTHON_GIL for Free-Threading
        if: matrix.python-version == '3.14t'
        run: echo "PYTHON_GIL=0" >> $GITHUB_ENV
        shell: bash

      - name: Install dependencies
        run: uv sync --all-extras --dev
        shell: bash

      - name: Run tests
        run: uv run pytest --cov=src --cov-report=xml
        shell: bash

  reproducible-builds:
    name: Reproducible Builds (Determinism Verification)
    needs: [test-ubuntu, test-extended]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@ff7abcd0c3c05ccf6adc123a8cd1fd4fb30fb493
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: "3.14"
      - name: Build wheel
        run: uv build
        shell: bash
      - name: Verify SHA256
        run: sha256sum dist/*.whl
        shell: bash

  dbt-test:
    needs: [lint-and-audit]
    if: always() && needs.lint-and-audit.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@ff7abcd0c3c05ccf6adc123a8cd1fd4fb30fb493
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: '3.12'

      - name: Start PostgreSQL
        run: |
          docker run --name postgres -e POSTGRES_PASSWORD=postgres -e POSTGRES_DB=postgres -p 5432:5432 -d postgres:15
          sleep 10
        shell: bash

      - name: Seed Mock Data for CI
        run: |
          docker exec postgres psql -U postgres -d postgres -c "CREATE SCHEMA IF NOT EXISTS bronze;"
          docker exec postgres psql -U postgres -d postgres -c "CREATE TABLE IF NOT EXISTS bronze.bronze_livertox_raw (coreason_id TEXT, uid TEXT, raw_data JSONB, extracted_blocks JSONB);"
          docker exec postgres psql -U postgres -d postgres -c "INSERT INTO bronze.bronze_livertox_raw (coreason_id, uid, raw_data, extracted_blocks) VALUES ('123', '123', '{}'::jsonb, '{\"hepatotoxicity_summary\": \"Test Summary\", \"likelihood_score\": \"Likelihood score: A\", \"mechanism_of_injury\": \"Test Mechanism\"}'::jsonb);"
        shell: bash

      - name: Run dbt deps
        run: uvx --from dbt-core --python 3.12 --with dbt-postgres dbt deps --project-dir src/coreason_etl_liver_tox/dbt_project
        shell: bash
        env:
          PGHOST: localhost
          PGPORT: 5432
          PGUSER: postgres
          PGPASSWORD: postgres
          PGDATABASE: postgres

      - name: Run dbt run
        run: uvx --from dbt-core --python 3.12 --with dbt-postgres dbt run --project-dir src/coreason_etl_liver_tox/dbt_project --profiles-dir src/coreason_etl_liver_tox/dbt_project
        shell: bash
        env:
          PGHOST: localhost
          PGPORT: 5432
          PGUSER: postgres
          PGPASSWORD: postgres
          PGDATABASE: postgres

      - name: Run dbt test
        run: uvx --from dbt-core --python 3.12 --with dbt-postgres dbt test --project-dir src/coreason_etl_liver_tox/dbt_project --profiles-dir src/coreason_etl_liver_tox/dbt_project
        shell: bash
        env:
          PGHOST: localhost
          PGPORT: 5432
          PGUSER: postgres
          PGPASSWORD: postgres
          PGDATABASE: postgres
